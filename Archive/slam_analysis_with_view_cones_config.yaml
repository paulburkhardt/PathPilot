pipeline:
  components:
    # Load point cloud from PLY file
    - type: PLYPointCloudLoader
      config:
        ply_path: "plots/one_chair/one_chair.ply"
        load_colors: true
    
    # Load camera trajectory from TXT file
    - type: TrajectoryDataLoader
      config:
        trajectory_path: "plots/one_chair/one_chair.txt"
        validate_format: true
    
    # Detect floor plane from point cloud and camera poses
    - type: FloorDetectionComponent
      config:
        sample_ratio: 0.1
        ransac_threshold: 0.05
        min_inliers: 1000
        n_movement_poses: 10
        floor_threshold: 0.05
    
    # Find closest points WITH view cone filtering
    - type: ClosestPointFinderComponent
      config:
        use_view_cone: true          # Enable view cone filtering
        cone_angle_deg: 90.0         # 90-degree half-angle (180° total FOV)
        max_view_distance: 10.0      # Maximum viewing distance
        use_floor_distance: true     # Calculate horizontal distances on floor plane
    
    # Visualize point cloud with floor highlighting
    - type: PointCloudDataVisualizer
      config:
        enable_floor_visualization: true
        floor_threshold: 0.05
        grid_size: 2.0
        highlight_floor_points: true
    
    # Visualize camera trajectory WITH view cones
    - type: CameraTrajectoryVisualizer
      config:
        show_trajectory_path: true
        show_view_cones: true        # Enable view cone visualization
        cone_length_factor: 1.5
        max_cone_length: 2.0
        show_distance_lines: true
        show_floor_analysis: true 