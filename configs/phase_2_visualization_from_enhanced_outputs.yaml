pipeline:
  components:
    # Phase 2: Load all pre-computed data from Phase 1 outputs
    # No recalculation needed - just load and visualize!
    
    # Load point cloud from PLY file saved by Phase 1
    - type: PLYPointCloudLoader
      config:
        ply_path: "enhanced_slam_outputs/incremental_analysis_detailed_20250616_172012/incremental_analysis_detailed_pointcloud.ply"  # Replace TIMESTAMP with actual timestamp
        load_colors: true
    
    # Load camera trajectory from TXT file saved by Phase 1
    - type: TrajectoryDataLoader
      config:
        trajectory_path: "enhanced_slam_outputs/incremental_analysis_detailed_20250616_172012/incremental_analysis_detailed_trajectory.txt"  # Replace TIMESTAMP with actual timestamp
        validate_format: true
    
        # Load pre-computed floor data from Phase 1 instead of recalculating
    - type: FloorDataLoader
      config:
        floor_data_path: "enhanced_slam_outputs/incremental_analysis_detailed_20250616_172012/incremental_analysis_detailed_floor_data.csv"  # Replace TIMESTAMP with actual timestamp
        data_format: "auto"  # Auto-detect CSV or JSON format
        validate_data: true

    # Load pre-computed closest points data from Phase 1 instead of recalculating
    - type: ClosestPointsDataLoader
      config:
        closest_points_path: "enhanced_slam_outputs/incremental_analysis_detailed_20250616_172012/incremental_analysis_detailed_closest_points.csv"  # Replace TIMESTAMP with actual timestamp
        data_format: "auto"  # Auto-detect CSV or JSON format
        validate_data: true
    
    # Visualize point cloud with floor highlighting
    - type: PointCloudDataVisualizer
      config:
        enable_floor_visualization: true
        floor_threshold: 0.05
        grid_size: 2.0
        highlight_floor_points: true
    
    # Visualize camera trajectory and closest point analysis
    - type: CameraTrajectoryVisualizer
      config:
        show_trajectory_path: true
        show_view_cones: true
        cone_length_factor: 1.5
        max_cone_length: 2.0
        show_distance_lines: true
        show_floor_analysis: true 