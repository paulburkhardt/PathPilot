pipeline:
  components:
    # Load video data for SLAM processing
    - type: MAST3RSLAMVideoDataLoader
      config:
        video_path: Data/Videos/chair_trash_bag.mp4
        mast3r_slam_config_path: "configs/MASt3R-SLAM_configs/calib.yaml"
    
    # Run MAST3R SLAM to generate point cloud and trajectory incrementally
    - type: MAST3RSLAMComponent
      config:
        point_cloud_method: accumulating
        c_confidence_threshold: 1.0 
        mast3r_slam_config_path: "configs/MASt3R-SLAM_configs/calib.yaml"
    
    # Incremental floor detection - waits for 3 frames, can refine over time
    - type: IncrementalFloorDetectionComponent
      config:
        min_frames: 3  # Wait for 3 frames before starting
        sample_ratio: 0.1
        ransac_threshold: 0.05
        min_inliers: 1000
        floor_threshold: 0.05
        refine_interval: 20  # Refine every 20 frames (0 = no refinement)
        max_refinement_poses: 20  # Use last 20 poses for refinement
    
    # Find closest points incrementally - waits for floor detection
    - type: IncrementalClosestPointFinderComponent
      config:
        use_view_cone: false  # Set to true to enable view cone filtering
        cone_angle_deg: 90.0
        max_view_distance: 10.0
        use_floor_distance: true  # Calculate horizontal distances on floor plane
        wait_for_floor: true  # Wait for floor detection before starting
    
    # Enhanced output writer with comprehensive data saving
    - type: EnhancedSLAMOutputWriter
      config:
        output_dir: "enhanced_slam_outputs"
        output_name: "incremental_analysis"
        save_point_cloud: true
        save_trajectory: true
        save_floor_data: true
        save_closest_points: true
        save_intermediate: false  # Set to true to save every N frames
        intermediate_interval: 10  # Save intermediate results every 10 frames
        create_timestamped_dir: true
        analysis_format: "json"  # Can be "json" or "csv" 